name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brinewatch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies (engine-free)
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy matplotlib pyyaml pytest
      - name: Run engine-free test suite
        # holoocean/Unreal/GPU are NOT installed here; engine tests are
        # marked holoocean_integration and excluded by pytest.ini addopts
        run: pytest -q
