# PFH 2026 official demonstration: BlueROV2 in FlatUnderwater (official world),
# sonar-based outfall localization with NO ground-truth access.
#
# Site v3 (visual redesign, inspection iterations 7-9): open, well-lit, flat
# shelf at (100, 50), bed z = -87.08 everywhere (verified by RangeFinder probe
# grid). The multiport outfall (outfall_scene.py v2: semi-buried approach
# pipeline + flanges + rock berm -> transition collar -> exposed diffuser on
# concrete sleepers -> 6 risers with collars + alternating inclined nozzles ->
# end cap) is the ONLY structure at the site, so every sonar contact and every
# camera frame is attributable to it. With the OFFICIAL engine the spawned
# structure is visual-only (runtime props are absent from the acoustic octree
# - proven in docs/application/pfh2026/SONAR_VALIDATION.md); acoustic
# experiments against the actual structure require the custom rebuild engine
# (backend holoocean_custom).
name: brinewatch_pfh2026
seed: 7
planner: adaptive

environment:
  ambient_salinity_psu: 39.5
  salinity_stratification_per_m: 0.005
  ambient_temperature_c: 24.0
  # Nominal plane; the demo script recalibrates z0/slopes from a RangeFinder
  # terrain probe at mission start (see scripts/run_pfh2026_demo.py).
  seabed_z0: -87.08
  seabed_slope_x: 0.0
  seabed_slope_y: 0.0
  current_dir_deg: 0.0          # plume spreads east, along the diffuser axis
  tide_amplitude_m: 2.5
  tide_period_s: 2400.0

# Outfall origin = diffuser start (local s=0); the approach pipeline runs
# 30 m west of it, the 16 m diffuser with 6 risers runs east (axis_deg 0,
# validated visually in inspection iterations 7-9).
outfall:
  x: 100.0
  y: 50.0
  axis_deg: 0.0
  n_ports: 6
  port_spacing_m: 3.2
  riser_height_m: 1.35
  discharge_salinity_psu: 68.0
  discharge_temperature_c: 27.5

# Survey box centred on the diffuser + near-field mixing zone; the approach
# pipeline corridor (x < 95) is left out on purpose - the plume source is the
# riser field around x 100..116, y = 50.
survey:
  x_min: 78.0
  x_max: 140.0
  y_min: 20.0
  y_max: 80.0
  altitude_m: 2.2
  grid_resolution_m: 3.0

budget:
  max_distance_m: 1100.0
  checkpoints: [0.25, 0.5, 0.75, 1.0]
  locate_fraction: 0.35         # sonar LOCATE needs more travel than synthetic

locator:
  mode: sonar                   # REAL ImagingSonar pipeline; no oracle
  prior_x: 113.0                # chart prior ~18 m NE of the diffuser centre
  prior_y: 62.0
  n_confirm: 4
  max_range_m: 25.0             # also sets the LOCATE search-leg scale

adaptive:
  weight_turn: 0.35
  min_leg_m: 12.0

compliance:
  mixing_zone_radius_m: 40.0
  threshold_increment_pct: 5.0
  eval_altitude_m: 1.0

backend:
  name: holoocean
  holoocean:
    world: FlatUnderwater
    package_name: Ocean
    ticks_per_sec: 30
    control_ticks: 15
    frames_per_sec: false
    show_viewport: true
    window_width: 1280
    window_height: 720
    spawn_outfall_props: true
    defer_scene_build: true     # scene built by the demo script after the
                                # terrain-calibration probe
    draw_debug: true
    min_altitude_m: 1.0
    sonar_enabled: true
    sonar_hz: 1.0               # 1 frame/sim-second: ample for LOCATE, halves
                                # the acoustic compute cost of the mission
    sonar_range_min_m: 1.0
    sonar_range_max_m: 40.0
    sonar_azimuth_deg: 120.0
    sonar_elevation_deg: 20.0
    sonar_range_bins: 512
    sonar_azimuth_bins: 256
    sonar_add_sigma: 0.05
    sonar_mult_sigma: 0.05
    sonar_init_octree_range_m: 50.0
    octree_min_m: 0.05
    octree_max_m: 5.0
