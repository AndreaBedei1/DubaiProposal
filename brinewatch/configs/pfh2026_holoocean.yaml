# PFH 2026 official demonstration: BlueROV2 in Dam (official Ocean world).
#
# Site v4 (official-level evaluation, docs/application/pfh2026/
# LEVEL_SELECTION.md): natural basin at (-100, -35), bed ~-66 m, structure
# axis 165 deg (auto-orient result, frozen here for reproducibility). The
# multiport outfall (outfall_scene.py v2) sits on a near-level line (1.8 m
# height range) with the dam infrastructure as background context; native
# penstocks stay 30-60 m away. The demo script recalibrates terrain from a
# RangeFinder probe at mission start. With the OFFICIAL engine the spawned
# structure is visual-only (runtime props are absent from the acoustic
# octree - proven in docs/application/pfh2026/SONAR_VALIDATION.md), so this
# mission runs from the chart prior; acoustic experiments against the actual
# structure use the custom rebuild engine (backend holoocean_custom).
name: brinewatch_pfh2026
seed: 7
planner: adaptive

environment:
  ambient_salinity_psu: 39.5
  salinity_stratification_per_m: 0.005
  ambient_temperature_c: 24.0
  # Nominal plane; the demo script recalibrates z0/slopes from a RangeFinder
  # terrain probe at mission start (see scripts/run_pfh2026_demo.py).
  seabed_z0: -65.9
  seabed_slope_x: 0.0
  seabed_slope_y: 0.0
  current_dir_deg: 165.0        # plume spreads along the diffuser axis
  tide_amplitude_m: 2.5
  tide_period_s: 2400.0

# Outfall origin = diffuser start (local s=0); the approach pipeline runs
# 30 m toward -15 deg (NE) behind it, the 19.6 m diffuser with 6 risers runs
# toward 165 deg (SW). Axis frozen from the auto-orient of the level
# evaluation (LEVEL_SELECTION.md) for reproducibility.
outfall:
  x: -100.0
  y: -35.0
  axis_deg: 165.0
  n_ports: 6
  port_spacing_m: 3.2
  riser_height_m: 1.35
  discharge_salinity_psu: 68.0
  discharge_temperature_c: 27.5

# Survey box centred on the diffuser + near-field mixing zone (diffuser
# centre ~(-107.7, -32.9)); the approach corridor (NE of the origin) is
# mostly outside on purpose - the plume source is the riser field.
survey:
  x_min: -150.0
  x_max: -85.0
  y_min: -70.0
  y_max: -10.0
  altitude_m: 2.2
  grid_resolution_m: 3.0

budget:
  max_distance_m: 1100.0
  checkpoints: [0.25, 0.5, 0.75, 1.0]
  locate_fraction: 0.35         # sonar LOCATE needs more travel than synthetic

locator:
  # OFFICIAL engine: the spawned outfall is sonar-invisible and Dam has no
  # stock structure at the site, so the official mission anchors on the
  # chart prior (documented fallback). The sonar mode with the real
  # structure runs on backend holoocean_custom (fork level).
  mode: synthetic
  prior_x: -95.0                # chart prior ~18 m NE of the diffuser centre
  prior_y: -20.0
  n_confirm: 4
  max_range_m: 25.0             # also sets the LOCATE search-leg scale

adaptive:
  weight_turn: 0.35
  min_leg_m: 12.0

compliance:
  mixing_zone_radius_m: 40.0
  threshold_increment_pct: 5.0
  eval_altitude_m: 1.0

backend:
  name: holoocean
  holoocean:
    world: FlatUnderwater
    package_name: Ocean
    ticks_per_sec: 30
    control_ticks: 15
    frames_per_sec: false
    show_viewport: true
    window_width: 1280
    window_height: 720
    spawn_outfall_props: true
    defer_scene_build: true     # scene built by the demo script after the
                                # terrain-calibration probe
    draw_debug: true
    min_altitude_m: 1.0
    sonar_enabled: true
    sonar_hz: 1.0               # 1 frame/sim-second: ample for LOCATE, halves
                                # the acoustic compute cost of the mission
    sonar_range_min_m: 1.0
    sonar_range_max_m: 40.0
    sonar_azimuth_deg: 120.0
    sonar_elevation_deg: 20.0
    sonar_range_bins: 512
    sonar_azimuth_bins: 256
    sonar_add_sigma: 0.05
    sonar_mult_sigma: 0.05
    sonar_init_octree_range_m: 50.0
    octree_min_m: 0.05
    octree_max_m: 5.0
