# BrineWatch default mission: kinematic backend, adaptive planner.
# Any key omitted here falls back to the defaults in brinewatch/utils/config.py.
name: brinewatch_demo
seed: 7
planner: adaptive          # lawnmower | adaptive

environment:
  ambient_salinity_psu: 39.5
  salinity_stratification_per_m: 0.005
  ambient_temperature_c: 24.0
  seabed_z0: -34.0
  seabed_slope_x: -0.015
  seabed_slope_y: 0.0
  current_dir_deg: 0.0          # plume spreads toward +x
  tide_amplitude_m: 2.5
  tide_period_s: 2400.0

outfall:
  x: -30.0
  y: 0.0
  axis_deg: 90.0
  n_ports: 4
  port_spacing_m: 3.0
  riser_height_m: 1.0
  discharge_salinity_psu: 68.0
  discharge_temperature_c: 27.5

plume:
  rise_height_m: 4.0
  nearfield_offset_m: 6.0
  nearfield_peak_anomaly_psu: 12.0
  farfield_peak_anomaly_psu: 8.0
  farfield_initial_width_m: 6.0
  farfield_spread_rate: 0.18
  layer_thickness_m: 1.6
  dilution_length_m: 35.0

survey:
  x_min: -60.0
  x_max: 60.0
  y_min: -60.0
  y_max: 60.0
  altitude_m: 2.0
  grid_resolution_m: 3.0

budget:
  max_distance_m: 1600.0
  checkpoints: [0.25, 0.5, 0.75, 1.0]
  locate_fraction: 0.25

compliance:
  mixing_zone_radius_m: 40.0     # scaled-down demo value; real permits 100-300 m
  threshold_increment_pct: 5.0
  eval_altitude_m: 1.0

backend:
  name: kinematic                # kinematic | holoocean
