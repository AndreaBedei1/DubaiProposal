name: brinewatch_benchmark_static
seed: 7
planner: adaptive
environment:
  ambient_salinity_psu: 39.5
  salinity_stratification_per_m: 0.005
  ambient_temperature_c: 24.0
  temperature_gradient_per_m: -0.01
  seabed_z0: -34.0
  seabed_slope_x: -0.015
  seabed_slope_y: 0.0
  current_dir_deg: 0.0
  tide_amplitude_m: 0.0
  tide_period_s: 2400.0
outfall:
  x: -30.0
  y: 0.0
  axis_deg: 90.0
  n_ports: 4
  port_spacing_m: 3.0
  riser_height_m: 1.0
  discharge_salinity_psu: 68.0
  discharge_temperature_c: 27.5
plume:
  rise_height_m: 4.0
  nearfield_offset_m: 6.0
  nearfield_sigma_xy_m: 4.0
  nearfield_sigma_z_m: 1.5
  nearfield_peak_anomaly_psu: 12.0
  farfield_peak_anomaly_psu: 8.0
