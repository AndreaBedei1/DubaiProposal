ctd:
  rate_hz: 1.0
  salinity_sigma_psu: 0.05
  temperature_sigma_c: 0.02
  depth_sigma_m: 0.1
locator:
  mode: synthetic
  max_range_m: 25.0
  detect_prob: 0.9
  range_sigma_m: 0.4
  bearing_sigma_deg: 4.0
  prior_sigma_m: 12.0
  prior_x: null
  prior_y: null
  n_confirm: 3
survey:
  x_min: -60.0
  x_max: 60.0
  y_min: -60.0
  y_max: 60.0
  altitude_m: 2.0
  grid_resolution_m: 3.0
  max_z_m: -3.0
budget:
  max_distance_m: 1600.0
  checkpoints:
  - 0.25
  - 0.5
  - 0.75
  - 1.0
  locate_fraction: 0.25
lawnmower:
  line_spacing_m: 10.0
  along_x: true
adaptive:
  n_candidates: 250
  weight_std: 0.7
  weight_boundary: 1.2
  weight_travel: 0.25
  weight_turn: 0.0
  boundary_scale_psu: 0.6
  min_leg_m: 8.0
  max_leg_m: 45.0
  min_separation_m: 4.0
  warmup_samples: 25
gp:
  length_xy_m: 12.0
  length_z_m: 1.8
  signal_sigma_psu: 2.5
  noise_sigma_psu: 0.08
  max_train_points: 800
  jitter: 1.0e-06
  predict_chunk: 4000
compliance:
  mixing_zone_radius_m: 40.0
  threshold_increment_pct: 5.0
  eval_altitude_m: 1.0
  p_exceed_min: 0.5
  p_clear_max: 0.1
  max_posterior_std_psu: 0.75
backend:
